<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event - ATM2K25</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>

<body class="min-h-screen bg-gradient-to-br from-purple-950 via-black to-gray-900 text-white flex items-center justify-center px-6">
  <style>
      .parallax {
    background-image: url('https://images.unsplash.com/photo-1511447333015-45b65e60f6d5?q=80&w=1555&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); /* Replace with your background image */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed; /* This creates the parallax effect */
    width: 100%;
    height: 100%;
    filter: brightness(0.4); /* Optional: darken the background for better text contrast */
    z-index: -10;
    }
    </style>
  <nav class="fixed top-0 w-full z-50 backdrop-blur-xl bg-white/10 border-b border-cyan-400/40">
        <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
          <a href="index.html"><img src="/res/atmLogo.png" alt="ATM'25" width="200px"></a>
          <ul class="flex space-x-6 text-lg">
                <li><a href="../" class="neon-link">Home</a></li>
                <li><a href="../departments" class="neon-link">Events</a></li>
            </ul>
        </div>
    </nav>
    
 <div class="parallax absolute inset-0 -z-10">
    <video src="/res/part.mp4" autoplay loop muted style="max-width: none; width: 100%;height: 100vh; object-fit: cover;"style="object-fit: cover;"></video>
  </div> 

    <div id="event-detail" class="glass-card neon-border max-w-2xl w-full p-8 rounded-2xl shadow-lg">
    <!-- Event details load here -->
  </div>

  <script>
    async function loadEvent() {
      const params = new URLSearchParams(window.location.search);
      const deptId = params.get("dept");
      const id = parseInt(params.get("id"));

      const res = await fetch("/events.json");
      const data = await res.json();
      const dept = data.find(d => d.deptId === deptId);
      if (!dept) return document.getElementById("event-detail").innerHTML = "<p>Department not found!</p>";
      
      const event = dept.events.find(e => e.id === id);
      if (!event) return document.getElementById("event-detail").innerHTML = "<p>Event not found!</p>";

      document.getElementById("event-detail").innerHTML = `
        <h1 class="text-3xl font-extrabold mb-4 text-neon">${event.title}</h1>
        <p class="mb-4 text-gray-300">${event.description}</p>
        <p class="mb-4"><strong>Timing:</strong> ${event.timing}</p>
        <div>
          <h2 class="text-xl font-bold mb-2">Rules & Regulations</h2>
          <ul class="list-disc list-inside text-gray-300">
            ${event.rules.map(rule => `<li>${rule}</li>`).join("")}
          </ul>
        </div>
      `;
    }
    loadEvent();
  </script>
  
<!-- Custom Cursor -->
<div id="cursor"></div>
<style>
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Custom cursor base */
      #cursor {
        width: 20px;
        height: 20px;
        border: 2px solid cyan;
        border-radius: 50%;
        position: absolute;
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition: transform 0.15s ease-out, width 0.2s, height 0.2s;
        z-index: 9999;
        box-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff;
        background: rgba(0, 255, 255, 0.08);
        backdrop-filter: blur(6px);
      }

      /* Cursor grows on hover */
      #cursor.cursor-hover {
        width: 40px;
        height: 40px;
        background: rgba(0, 255, 255, 0.15);
        box-shadow: 0 0 15px #0ff, 0 0 25px #0ff, 0 0 40px #0ff;
      }
</style>
<script src="../script.js"></script>

</body>
</html>
